version: '3.8'

# ================================
# 📊 BullMQ Dashboard Only Setup
# ================================

services:
  # ================================
  # 🔴 Redis Cache & Queue
  # ================================
  redis:
    image: redis:7-alpine
    container_name: sseudam-redis-dashboard
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_dashboard_data:/data
    restart: unless-stopped
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # 📊 BullMQ Dashboard
  # ================================
  bull-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sseudam-bull-dashboard-standalone
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ================================
  # 📊 Redis Commander (Optional)
  # ================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sseudam-redis-commander-dashboard
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=dashboard:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin123
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - dashboard-network

# ================================
# 💾 Volumes
# ================================
volumes:
  redis_dashboard_data:
    driver: local

# ================================
# 🌐 Networks
# ================================
networks:
  dashboard-network:
    driver: bridge
    name: sseudam-dashboard-network