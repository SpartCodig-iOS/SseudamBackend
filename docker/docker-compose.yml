# SandFox 스타일로 개선된 Compose 파일

# ================================
# 📊 BullMQ Dashboard Only Setup
# ================================

services:
  # ================================
  # 🔴 Redis Cache & Queue
  # ================================
  redis:
    image: redis:7-alpine
    container_name: sseudam-redis-dashboard
    restart: unless-stopped
    ports:
      - "6382:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_dashboard_data:/data
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # 📊 BullMQ Dashboard
  # ================================
  bull-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sseudam-bull-dashboard-standalone
    restart: unless-stopped
    ports:
      - "9001:3001"
    environment:
      - PORT=3001
      - HOST=${DASHBOARD_HOST:-localhost}
      - PROTOCOL=${DASHBOARD_PROTOCOL:-http}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro  # 읽기 전용 소스 마운트 (개발용)
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ================================
  # 📊 Redis Commander (Optional)
  # ================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sseudam-redis-commander-dashboard
    restart: unless-stopped
    ports:
      - "9002:8081"
    environment:
      - REDIS_HOSTS=dashboard:redis:6379
      - HTTP_USER=${REDIS_COMMANDER_USER:-admin}
      - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD:-admin123}
    depends_on:
      - redis
    networks:
      - dashboard-network

# ================================
# 💾 Volumes
# ================================
volumes:
  redis_dashboard_data:
    driver: local

# ================================
# 🌐 Networks
# ================================
networks:
  dashboard-network:
    driver: bridge
    name: sseudam-dashboard-network