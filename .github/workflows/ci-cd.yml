name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-test:
    name: Fast Build & Test (Nest.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 버전 명시 + npm 캐시
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        run: rm -rf dist

      - name: TypeScript build
        run: npm run build

      - name: Verify build success
        run: echo "✅ Node build completed successfully"

  # 👉 Docker 이미지는 main 브랜치에 push될 때만 빌드 (느려도 괜찮음)
  docker-build:
    name: Docker Build (only on main)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (builder stage만 테스트)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          # 빌드 테스트용이라 최종 이미지까지는 안 만들고 builder 단계까지만
          target: builder
          tags: sparta-final-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

